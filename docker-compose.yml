services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      GRAPH_RAG_CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro
      - hf-cache:/app/.cache/huggingface

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  hf-cache:
